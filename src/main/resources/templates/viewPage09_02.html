<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2. Constraint Validator 구현체</title>
    <style>
        span{
            color: red;
            border: 1px dotted red;
        }
    </style>
</head>
<body>
    <h3>2. Constraint Validator 구현체 유효성 검사</h3>
    <form th:object="${member2}" action="/exam09_02" method="post">
        <p>ID : <input type="text" th:field="*{memberId}"><span th:errors="*{memberId}"></span></p>
        <p>Password : <input type="text" th:field="*{passwd}"><span th:errors="*{passwd}"></span></p>
        <p>
            <button type="submit">확인</button>&nbsp;&nbsp;
            <button type="reset">취소</button>
        </p>
    </form>
</body>
</html>
